description = "Pack a natural language file into robot-relay shorthand to cut input overhead"
prompt = "Pack the file at {{args}} into robot-relay shorthand. Run: python3 -m scripts {{args}} from the rr-pack skill directory. If scripts unavailable, compress the file directly: remove articles/filler/hedges/pleasantries, use fragments, short synonyms, operator symbols. Preserve EXACTLY: code blocks, inline code, URLs, file paths, commands, technical names, version numbers. Preserve structure: headings, bullet hierarchy, tables. Backup original as FILE.source.md before overwriting. Emit beep signals: 🟢 · bip · for progress, 🔴 · BEEP · for warnings, 🔴 ··· BEEEEEP ··· for failures."
